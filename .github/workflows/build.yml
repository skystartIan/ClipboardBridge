name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # 固定簽章：自產一把 CI keystore 到受控路徑並快取，之後每次 build 復用同一把
      # → 簽章不再每次變，adb install -r 即可，通知 / Shizuku 授權不會掉
      - name: Cache CI keystore (stable signature)
        uses: actions/cache@v4
        with:
          path: app/ci.keystore
          key: clipboardbridge-ci-keystore-v1

      - name: Ensure CI keystore exists
        run: |
          if [ ! -f app/ci.keystore ]; then
            keytool -genkeypair -v -keystore app/ci.keystore -alias cb \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass clipboard -keypass clipboard \
              -dname "CN=ClipboardBridge, OU=CI, O=CB, L=X, ST=X, C=US"
            echo "generated new ci.keystore"
          else
            echo "reused cached ci.keystore"
          fi

      - name: Build Release APK
        run: gradle assembleRelease
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardBridge
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
