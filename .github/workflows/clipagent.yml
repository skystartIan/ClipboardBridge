name: Build ClipAgent dex

on:
  push:
    branches: [ main ]
    paths:
      - 'clipagent/**'
      - '.github/workflows/clipagent.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform + build-tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Compile to dex
        run: |
          ANDROID_JAR="$ANDROID_SDK_ROOT/platforms/android-34/android.jar"
          D8="$ANDROID_SDK_ROOT/build-tools/34.0.0/d8"
          echo "android.jar = $ANDROID_JAR"
          mkdir -p out classes
          javac -source 8 -target 8 -bootclasspath "$ANDROID_JAR" \
            -d classes clipagent/ClipAgent.java
          "$D8" --min-api 26 --output out \
            $(find classes -name '*.class')
          mv out/classes.dex clipagent.dex
          ls -la clipagent.dex

      - name: Upload dex
        uses: actions/upload-artifact@v4
        with:
          name: clipagent
          path: clipagent.dex
          retention-days: 30
