name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # 固定 debug 簽章：第一次 build 產生 debug.keystore 後快取，之後每次復用
      # → 簽章不再每次變，adb install -r 即可，通知/ Shizuku 授權不會掉
      - name: Cache debug keystore (stable signature)
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: clipboardbridge-debug-keystore-v1

      - name: Build Release APK
        run: gradle assembleRelease
        working-directory: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardBridge
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
